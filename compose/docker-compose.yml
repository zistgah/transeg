# Project TransEg — one compose starts everything (INTENT: Container Requirements).
# © 1993-2026 Abhishek Choudhary · AyeAI · GPL-3.0-or-later
# GPU: faster-liveportrait is the SOLE tenant of the RTX 3050's 4 GB (CONTRACT §4).
# v0.1.1 fixes: real FLP image (not a hand-built CUDA Dockerfile), VAD in-process
#               (the silero-vad backend host never existed), kokoro backend made explicit.
name: transeg
x-svc: &svc
  restart: unless-stopped
  networks: [transeg]
  environment: &env
    TRANSEG_MOCK: "${TRANSEG_MOCK:-0}"

services:
  gateway:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: gateway}}
    ports: ["8080:80"]
    environment:
      <<: *env
      TRANSEG_MEMORY_URL:    http://memory:80
      TRANSEG_STAGGERED_URL: http://staggered:80
      TRANSEG_SPEECH_URL:    http://speech:80
      TRANSEG_VAD_URL:       http://vad:80
      TRANSEG_LLM_URL:       http://llm:80
      TRANSEG_TTS_URL:       http://tts:80
      TRANSEG_AVATAR_URL:    http://avatar:80
    depends_on: [memory, staggered, speech, vad, llm, tts, avatar]

  memory:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: memory}}
    environment: {<<: *env, TRANSEG_MEMORY_DB: /data/identity_graph.db}
    volumes: ["transeg-data:/data"]

  staggered:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: staggered}}
    ports: ["8082:80"]                       # benchmarks (transeg-research) read /capability
    environment: {<<: *env, TRANSEG_STAGGERED_STATE: /data/staggered_state.json}
    volumes: ["transeg-data:/data"]

  speech:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: speech}}
    environment: {<<: *env, TRANSEG_WHISPER_URL: "http://whisper-cpp:8090/inference"}
    depends_on: [whisper-cpp]

  vad:
    <<: *svc
    build: {context: .., dockerfile: docker/vad.Dockerfile}   # + onnxruntime, CPU
    environment: {<<: *env, TRANSEG_SILERO_ONNX: /models/silero_vad.onnx}
    volumes: ["../models:/models:ro"]        # silero runs in-process; no backend container

  llm:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: llm}}
    environment: {<<: *env, TRANSEG_OLLAMA_URL: "http://llm-backend:11434"}
    depends_on: [llm-backend]

  tts:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: tts}}
    environment: {<<: *env, TRANSEG_KOKORO_URL: "${TRANSEG_KOKORO_URL:-http://kokoro-tts:8880/v1/audio/speech}"}

  avatar:
    <<: *svc
    build: {context: .., dockerfile: docker/service.Dockerfile, args: {SERVICE: avatar}}
    environment: {<<: *env, TRANSEG_LIVEPORTRAIT_URL: "http://faster-liveportrait:8093/render"}
    depends_on: [faster-liveportrait]

  # ---- backends (models mounted read-only; no duplicate loading) ----
  whisper-cpp:
    <<: *svc
    image: ${TRANSEG_WHISPER_IMAGE:-ghcr.io/ggml-org/whisper.cpp:main}   # PIN on target: bootstrap.sh --pin
    command: ["--host","0.0.0.0","--port","8090","-m","/models/ggml-base.en.bin"]
    volumes: ["../models:/models:ro"]
    deploy: {resources: {limits: {memory: 2g}}}          # CPU only

  llm-backend:
    <<: *svc
    image: ollama/ollama:latest                          # PIN on target: bootstrap.sh --pin
    volumes: ["transeg-ollama:/root/.ollama"]
    environment: {OLLAMA_NUM_GPU: "0"}                   # CPU: the 4 GB VRAM is the avatar's
    deploy: {resources: {limits: {memory: 8g}}}

  # Kokoro TTS. UNVERIFIED IMAGE — set TRANSEG_KOKORO_IMAGE yourself and pin it, or run
  # your own; the tts adapter only needs an endpoint that returns audio for {text, voice}.
  kokoro-tts:
    <<: *svc
    image: ${TRANSEG_KOKORO_IMAGE:-ghcr.io/remsky/kokoro-fastapi-cpu:latest}
    profiles: ["tts"]                                    # opt-in: docker compose --profile tts up
    deploy: {resources: {limits: {memory: 4g}}}

  faster-liveportrait:
    <<: *svc
    image: shaoguo/faster_liveportrait:v3                # upstream image: onnxruntime-gpu + TensorRT inside
    working_dir: /root/FasterLivePortrait
    command: ["python","transeg_server.py","--host","0.0.0.0","--port","8093",
              "--cfg","${TRANSEG_FLP_CFG:-configs/onnx_infer.yaml}",
              "--source","/models/liveportrait/source.png"]
    volumes:
      - "../third_party/FasterLivePortrait:/root/FasterLivePortrait"
      - "../models/liveportrait/checkpoints:/root/FasterLivePortrait/checkpoints"
      - "../docker/liveportrait_server.py:/root/FasterLivePortrait/transeg_server.py:ro"
      - "../models:/models:ro"
    environment: {<<: *env, FLIP_CHECKPOINT_DIR: /root/FasterLivePortrait/checkpoints}
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

networks: {transeg: {}}
volumes: {transeg-data: {}, transeg-ollama: {}}
